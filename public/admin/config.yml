backend:
  name: git-gateway
  branch: main

local_backend:
  url: http://127.0.0.1:8082/api/v1

media_folder: public/uploads
public_folder: /uploads

publish_mode: editorial_workflow

collections:
  - name: site
    label: Site
    files:
      - name: portfolio
        label: Portfolio Content
        file: src/data/site.json
        format: json
        fields:
          - { label: Name, name: name, widget: string }
          - label: Bio
            name: bio
            widget: list
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Projects Intro
            name: projectsIntro
            widget: list
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Links
            name: links
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: href, widget: string }
          - label: Projects
            name: projects
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Tag, name: tag, widget: string, required: false }
              - { label: Slug, name: slug, widget: string, required: false }
              - { label: Summary, name: body, widget: text }
              - label: Stack
                name: stack
                widget: list
                required: false
                field: { label: Item, name: item, widget: string }
              - { label: Display Date, name: date, widget: string }
              - { label: Machine Date, name: datetime, widget: string }
              - label: Detail
                name: detail
                widget: object
                collapsed: true
                required: false
                fields:
                  - label: Why
                    name: why
                    widget: list
                    required: false
                    field: { label: Block, name: block, widget: text }
                  - label: Decisions
                    name: decisions
                    widget: list
                    required: false
                    fields:
                      - { label: Heading, name: heading, widget: string }
                      - { label: Body, name: body, widget: text }
                  - { label: Demo Label, name: demoLabel, widget: string, required: false }
                  - label: Artifacts
                    name: artifacts
                    widget: list
                    required: false
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: href, widget: string }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Updated, name: updated, widget: string }
              - { label: Updated Datetime, name: updatedDatetime, widget: string }
              - { label: Copyright, name: copyright, widget: string }
